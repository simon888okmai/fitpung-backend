version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: fitpung_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: fitpung_api
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Override the DATABASE_URL to connect to the internal 'db' container instead of localhost
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      - db

volumes:
  postgres_data:
